<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estatísticas</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { overflow-y: auto; }
    .stats-topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .stats-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .05em;
      color: var(--accent);
    }
    .stats-body {
      padding: 20px;
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .stats-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 700px) { .stats-grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="stats-topbar">
    <div class="stats-title">📊 Estatísticas</div>
    <div style="display:flex;align-items:center;gap:8px;margin-left:auto">
      <label style="font-size:.82rem;color:var(--text2)">Data:</label>
      <input type="date" class="input" id="stats-date" style="width:160px">
    </div>
  </div>

  <div class="stats-body">

    <!-- KPIs -->
    <div>
      <div class="card-title mb-2"><span class="dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);margin-right:8px"></span>Resumo do dia</div>
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-label">💰 Faturamento</div>
          <div class="stat-val" id="stat-faturamento">R$ 0,00</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">📋 Pedidos</div>
          <div class="stat-val" id="stat-pedidos">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">🎯 Ticket médio</div>
          <div class="stat-val" id="stat-ticket">R$ 0,00</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">✕ Cancelados</div>
          <div class="stat-val" style="color:var(--hot)" id="stat-cancelados">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">🛵 Entregas</div>
          <div class="stat-val" style="color:var(--blue)" id="stat-entregas">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">🏪 Retiradas</div>
          <div class="stat-val" style="color:var(--green)" id="stat-retiradas">0</div>
        </div>
      </div>
    </div>

    <!-- Ranking proteínas + itens -->
    <div class="stats-grid-2">
      <div class="card">
        <div class="card-header">
          <div class="card-title"><span class="dot"></span>Ranking de Proteínas</div>
        </div>
        <div id="proteinas-ranking">
          <div style="color:var(--text3);font-size:.88rem">Nenhum dado</div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title"><span class="dot"></span>Itens Mais Vendidos</div>
        </div>
        <div id="itens-ranking">
          <div style="color:var(--text3);font-size:.88rem">Nenhum dado</div>
        </div>
      </div>
    </div>

    <!-- Pagamentos + bairros -->
    <div class="stats-grid-2">
      <div class="card">
        <div class="card-header">
          <div class="card-title"><span class="dot"></span>Formas de Pagamento</div>
        </div>
        <div id="formas-pagamento">
          <div style="color:var(--text3);font-size:.88rem">Nenhum dado</div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <div class="card-title"><span class="dot"></span>Entregas por Bairro</div>
        </div>
        <div id="bairros-ranking">
          <div style="color:var(--text3);font-size:.88rem">Sem entregas</div>
        </div>
      </div>
    </div>

    <!-- Lista de pedidos do dia -->
    <div class="card">
      <div class="card-header">
        <div class="card-title"><span class="dot"></span>Todos os Pedidos do Dia</div>
      </div>
      <div id="lista-pedidos-stats"></div>
    </div>

  </div>

  <script type="module" src="js/stats.js"></script>
</body>
</html>
