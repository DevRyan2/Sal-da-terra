<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozinha — Painel de Pedidos</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { overflow-y: auto; }
    .kitchen-topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .kitchen-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .05em;
      color: var(--accent);
    }
    #cozinha-counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: .9rem; color: var(--text2);
    }
    .btn-toggle-som {
      padding: 6px 14px; border-radius: var(--r-sm);
      background: var(--card2); border: 1px solid var(--border2);
      color: var(--text2); cursor: pointer; font-size: .85rem;
      transition: all .15s;
    }
    .btn-toggle-som.ativo { background: rgba(245,166,35,.15); border-color: var(--accent); color: var(--accent); }
    .auto-badge {
      font-size: .72rem; color: var(--green); font-family: 'JetBrains Mono', monospace;
      background: rgba(28,184,106,.12); border: 1px solid rgba(28,184,106,.3);
      padding: 2px 8px; border-radius: 99px;
    }
  </style>
</head>
<body>
  <div class="kitchen-topbar">
    <div class="kitchen-title">👨‍🍳 Cozinha</div>
    <div id="cozinha-counter" class="text-muted">Carregando...</div>
    <div class="auto-badge">⟳ Auto 10s</div>
    <div style="margin-left:auto;display:flex;gap:8px">
      <button class="btn-toggle-som" id="btn-toggle-som">🔕 Som desligado</button>
      <button class="btn-icon" id="btn-refresh-cozinha" title="Atualizar agora">↻ Atualizar</button>
    </div>
  </div>

  <div id="kitchen-grid" class="kitchen-grid">
    <div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text3)">
      <div style="font-size:2rem">⟳</div>
      <div style="margin-top:8px">Carregando pedidos...</div>
    </div>
  </div>

  <script type="module" src="js/cozinha.js"></script>
</body>
</html>
