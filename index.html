<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Pedidos</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/print.css">
</head>
<body>
  <!-- Área de impressão (oculta na tela, aparece no print) -->
  <div id="nota-impressao"></div>

  <!-- Toasts -->
  <div id="toast-container"></div>

  <!-- App -->
  <div id="app">

    <!-- ── Topbar ─────────────────────────────────────────── -->
    <header class="topbar">
      <div class="topbar-logo">Restaurante</div>

      <nav class="topbar-tabs">
        <button class="tab-btn active" data-tab="quentinha">🍱 Quentinha</button>
        <button class="tab-btn"        data-tab="prato">🍽️ Prato Feito</button>
        <button class="tab-btn"        data-tab="balcao">🏪 Balcão</button>
      </nav>

      <div class="topbar-actions">
        <div class="topbar-clock" id="topbar-clock">--:--:--</div>
        <button class="btn-icon" id="btn-abrir-stats"   title="Estatísticas">📊</button>
        <button class="btn-icon" id="btn-abrir-cozinha" title="Abrir painel da cozinha">👨‍🍳</button>
        <button class="btn-icon" id="btn-config-restaurante" title="Configurações">⚙️</button>
      </div>
    </header>

    <!-- ── Conteúdo ───────────────────────────────────────── -->
    <div class="main-content">

      <!-- Painel esquerdo: abas -->
      <div class="panel-left">
        <div id="tab-quentinha" class="tab-content"></div>
        <div id="tab-prato"     class="tab-content hidden"></div>
        <div id="tab-balcao"    class="tab-content hidden"></div>
      </div>

      <!-- Painel direito: carrinho + lista de pedidos -->
      <div class="panel-right">
        <!-- Carrinho (injetado pelos módulos de aba) -->
        <div id="cart-sidebar" style="display:flex;flex-direction:column;flex:1;border-bottom:1px solid var(--border)">
          <div class="orders-sidebar-header">
            <div class="orders-sidebar-title">🛒 Carrinho</div>
          </div>
          <div class="empty-state" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <div class="ico">🛒</div>
            <p>Selecione uma aba para começar</p>
          </div>
        </div>

        <!-- Lista de pedidos do dia -->
        <div id="sidebar-pedidos" style="display:flex;flex-direction:column;flex:1;min-height:0"></div>
      </div>

    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
